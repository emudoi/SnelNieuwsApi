# NFS-backed image cache for /v2/images/*. Provisioned by the
# `nfs-shared` StorageClass (in-cluster nfs-subdir-external-provisioner
# in `nfs-system`, exporting from the control-plane node's /srv/nfs).
# Same pattern as argo-workflows build-cache and pgadmin: dynamic per-PVC
# subdirectory, RWX, retain-on-delete.
#
# RWX is required so that any future scaled-out replica of the API
# (topologySpreadConstraints already permits two-per-node) can share the
# image catalogue. With one replica today, RWO would also work — using
# RWX leaves the headroom in place.
#
# Capacity: nfs-subdir does NOT enforce the requested size on the wire
# (NFS, not block storage). The number is reported in `kubectl describe
# pvc` and helps capacity planning — the cleanup scheduler reclaims rows
# older than images.cleanup.retention-hours so steady state is bounded
# by article ingestion volume × retention window.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snelnieuws-api-images
  namespace: emudoi-snelnieuws-api
  labels:
    app.kubernetes.io/name: snelnieuws-api
    app.kubernetes.io/component: image-cache
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-shared
  resources:
    requests:
      storage: 50Gi
