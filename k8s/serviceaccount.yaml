# ServiceAccount used by the pod for both:
#   1. Vault Agent Injector authentication. The `vault.hashicorp.com/role`
#      annotation on the deployment selects an auth role bound to this SA
#      in this namespace (wired up by the k3s-infra vault role).
#   2. Standard pod identity (no extra RBAC required — the app doesn't
#      talk to the k8s API).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emudoi-snelnieuws-api
  namespace: emudoi-snelnieuws-api
  labels:
    app.kubernetes.io/name: snelnieuws-api
    app.kubernetes.io/managed-by: argocd
