server {
  port = 8080
  port = ${?SERVER_PORT}
}

database {
  driver    = "org.postgresql.Driver"
  host      = "localhost"
  host      = ${?DB_HOST}
  port      = 5432
  port      = ${?DB_PORT}
  name      = "snelnieuws"
  name      = ${?DB_NAME}
  url       = "jdbc:postgresql://"${database.host}":"${database.port}"/"${database.name}
  url       = ${?DB_URL}
  user      = "postgres"
  user      = ${?DB_USER}
  password  = "postgres"
  password  = ${?DB_PASSWORD}
  pool-size = 10
}

articles {
  cleanup {
    enabled          = true
    enabled          = ${?ARTICLE_CLEANUP_ENABLED}
    retention-hours  = 48
    retention-hours  = ${?ARTICLE_CLEANUP_RETENTION_HOURS}
    interval-minutes = 60
    interval-minutes = ${?ARTICLE_CLEANUP_INTERVAL_MINUTES}
  }
}

notifications {
  enabled                   = true
  enabled                   = ${?NOTIFICATIONS_ENABLED}
  # Shared secret expected on POST /notifications/dispatch via X-API-Key header.
  # Empty key disables the dispatch endpoint regardless of `enabled`.
  api-key                   = ""
  api-key                   = ${?NOTIFICATIONS_API_KEY}
  # Path to the Firebase service account JSON. In k8s with Vault Agent Injector,
  # mount via vault.hashicorp.com/agent-inject-secret-firebase-credentials
  # so the file lands at /vault/secrets/firebase-credentials.json.
  firebase-credentials-path = "/vault/secrets/firebase-credentials.json"
  firebase-credentials-path = ${?FIREBASE_CREDENTIALS_PATH}
}

kafka {
  summarized-import {
    bootstrap-servers = "10.0.1.10:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    bootstrap-servers = ${?KAFKA_SUMMARIZED_IMPORT_BOOTSTRAP_SERVERS}
    topic             = "snelnieuws.articles.summarized"
    topic             = ${?KAFKA_SUMMARIZED_IMPORT_TOPIC}
    group-id          = "snelnieuws-api-summarized-importer"
    group-id          = ${?KAFKA_SUMMARIZED_IMPORT_GROUP_ID}
    auto-offset-reset = "earliest"
    auto-offset-reset = ${?KAFKA_SUMMARIZED_IMPORT_AUTO_OFFSET_RESET}
    enabled           = true
    enabled           = ${?KAFKA_SUMMARIZED_IMPORT_ENABLED}
  }
}
